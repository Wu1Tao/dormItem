<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Учётные записи администраторов</title>
    <link rel="stylesheet" href="/app.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- 可选：Font Awesome 6 免费图标库（提升视觉） -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="container">
    <h1>Управление учётными записями администраторов</h1>

    <nav class="menu">
        <a href="/">Главная</a>
        <a href="/students">Студенты</a>
        <a href="/items">Предметы</a>
        <a href="/issue">Выдача</a>
        <a href="/return">Возврат</a>
        <a href="/logout">Выйти</a>
    </nav>

    <div class="alert error" th:if="${error}" th:text="${error}"></div>

    <h2>Создать учётную запись</h2>

    <form method="post" action="/admin/users/create" class="form">
        <label>Логин</label>
        <input type="text" name="account" required>

        <label>Имя пользователя</label>
        <input type="text" name="name">

        <label>Пароль</label>
        <input type="password" name="password" required>

        <label>Роль</label>
        <select name="role" required>
            <option value="1">Администратор общежития</option>
            <option value="2">Системный администратор</option>
        </select>

        <button type="submit">Создать</button>
    </form>

    <h2>Список учётных записей</h2>

    <table>
        <thead>
        <tr>
            <th>Логин</th>
            <th>Имя</th>
            <th>Роль</th>
            <th>Статус</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="u : ${users}">
            <td th:text="${u.userAccount}"></td>
            <td th:text="${u.userName}"></td>
            <td>
                <span th:if="${u.role.name() == 'ADMIN'}">Системный администратор</span>
                <span th:if="${u.role.name() == 'USER'}">Администратор общежития</span>
            </td>
            <td>
                <span th:if="${u.userStatus.name() == 'ACTIVE'}">Активен</span>
                <span th:if="${u.userStatus.name() == 'DISABLED'}">Заблокирован</span>
            </td>
            <td>
                <form th:if="${u.userStatus.name() == 'ACTIVE'}" method="post" action="/admin/users/block" style="display:inline;">
                    <input type="hidden" name="id" th:value="${u.id}">
                    <button type="submit">Заблокировать</button>
                </form>
                <form th:if="${u.userStatus.name() == 'DISABLED'}" method="post" action="/admin/users/unblock" style="display:inline;">
                    <input type="hidden" name="id" th:value="${u.id}">
                    <button type="submit">Разблокировать</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
