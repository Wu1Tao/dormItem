<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Система учета общежития</title>
    <link rel="stylesheet" href="/app.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- 可选：Font Awesome 6 免费图标库（提升视觉） -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="container">
    <div class="top-bar">
        <div>
            <h1>Система учета Предмета общежития</h1>
            <p class="hint">
                Пользователь:
                <strong th:text="${session.currentUserName}">user</strong>
                |
                Роль:
                <strong th:text="${session.currentUserRole}">role</strong>
            </p>
        </div>

        <div>
            <a class="logout-button" href="/logout">Выйти</a>
        </div>
    </div>

    <nav class="menu">
        <a href="/students">Студенты</a>
        <a href="/items">Предметы</a>
        <a href="/issue">Выдача</a>
        <a href="/return">Возврат</a>

        <a th:if="${session.currentUserRole.name() == 'ADMIN'}"
           href="/admin/users">
            Учётные записи администраторов
        </a>

        <a href="/logout">Выйти</a>
    </nav>

    <p class="hint">
        Выберите нужный раздел для работы с системой.
    </p>
</div>
</body>
</html>
